# tyrax.tech — nginx site config
# Deploy to /etc/nginx/sites-available/tyrax.tech and symlink to sites-enabled

# Redirect www → apex
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.tyrax.tech;

    # ssl_certificate paths — set via certbot
    return 301 https://tyrax.tech$request_uri;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name tyrax.tech;
    return 301 https://tyrax.tech$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tyrax.tech;

    root /var/www/tyrax.tech;
    index index.html;

    # ssl_certificate /etc/letsencrypt/live/tyrax.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tyrax.tech/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static asset caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|apk|exe|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /llms.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
    }
}
