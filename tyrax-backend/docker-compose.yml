services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tyrax
      POSTGRES_USER: tyrax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tyrax_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tyrax -d tyrax"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tyrax:${POSTGRES_PASSWORD:-tyrax_dev}@postgres:5432/tyrax?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      TELEGRAM_BOT_URL: ${TELEGRAM_BOT_URL:-https://t.me/tyraxvpnbot}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-tyraxvpnbot}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@tyrax.tech}
      WEBSITE_URL: ${WEBSITE_URL:-https://tyrax.tech}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.tyrax.tech}
      WINDOWS_APP_VERSION: ${WINDOWS_APP_VERSION:-1.0.15}
      ANDROID_APP_VERSION: ${ANDROID_APP_VERSION:-1.0.2}
      ANDROID_APP_VERSION_CODE: ${ANDROID_APP_VERSION_CODE:-3}
      ANDROID_APP_URL: ${ANDROID_APP_URL:-https://tyrax.tech/download/tyrax.apk}
      ANDROID_UPDATE_MANDATORY: ${ANDROID_UPDATE_MANDATORY:-false}
      ANDROID_UPDATE_NOTES: ${ANDROID_UPDATE_NOTES:-}
      FREEKASSA_SHOP_ID: ${FREEKASSA_SHOP_ID}
      FREEKASSA_API_KEY: ${FREEKASSA_API_KEY}
      FREEKASSA_SECRET_WORD_2: ${FREEKASSA_SECRET_WORD_2}
      CRYPTO_PAY_TOKEN: ${CRYPTO_PAY_TOKEN}
      TELEGRAM_SUPPORT_BOT_TOKEN: ${TELEGRAM_SUPPORT_BOT_TOKEN:-}
      TELEGRAM_SUPPORT_BOT_URL: ${TELEGRAM_SUPPORT_BOT_URL:-https://t.me/tyrax_support_bot}
      SMTP_HOST: ${SMTP_HOST:-smtp.timeweb.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-support@tyrax.tech}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-TYRAX <support@tyrax.tech>}
      PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
